name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for file in index.html style.css game.js; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
            echo "✓ $file"
          done

      - name: Check JS syntax
        run: node --check game.js && echo "✓ game.js syntax OK"

      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate index.html

      - name: Check CSS is non-empty
        run: |
          if [ ! -s style.css ]; then
            echo "style.css is empty"
            exit 1
          fi
          echo "✓ style.css non-empty"
